<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:'Newsreader',Georgia,serif;font-size:17px;line-height:1.6;min-height:100vh;transition:background .2s,color .2s;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}
::selection{background:var(--accent);color:#fff}

:root{
  --bg:#fffefb;--bg2:#f4f0e8;--bg3:#ebe5d8;--card:#ffffff;
  --ink:#191510;--ink2:#5e5448;--ink3:#9b9082;--border:#e8e1d4;--border2:#d6ccba;
  --accent:#d63a1e;--accent-d:#b42f15;
  --blue:#2563a8;--green:#2f7d45;--amber:#a8730f;--purple:#7a3fb0;--teal:#10847a;--rose:#bd3a5e;
  --fh:'Outfit',system-ui,sans-serif;--fd:'Fraunces',Georgia,serif;
  --r-sm:10px;--r:14px;--r-lg:20px;--r-pill:999px;
}
[data-theme=dark]{
  --bg:#13110d;--bg2:#1c1813;--bg3:#26211a;--card:#1d1914;
  --ink:#f3ecdf;--ink2:#bcae97;--ink3:#776b56;--border:#2e281e;--border2:#3e3527;
  --accent:#f15a39;--accent-d:#f36d4e;
  --blue:#62a0e0;--green:#5cbe78;--amber:#d9a838;--purple:#a884e2;--teal:#3fbcae;--rose:#e07a98;
}

/* per-topic accent */
.t-crime{--tc:var(--accent)}.t-sports{--tc:var(--blue)}.t-schools{--tc:var(--green)}
.t-weather{--tc:var(--amber)}.t-government{--tc:var(--purple)}.t-agriculture{--tc:var(--green)}
.t-business{--tc:var(--amber)}.t-events{--tc:var(--teal)}.t-community{--tc:var(--rose)}
.t-obituaries{--tc:var(--ink3)}

/* flat topic placeholder fills */
.fill{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--tc,var(--ink3))}
.fill svg{width:34%;max-width:64px;height:auto;opacity:.9;stroke:#fff}

.wrap{max-width:1180px;margin:0 auto;padding:0 22px}
.wrap-narrow{max-width:700px;margin:0 auto;padding:0 22px}

/* ── Masthead ── */
.mast{background:var(--bg);border-bottom:2px solid var(--ink);position:sticky;top:0;z-index:100}
.mast-top{display:flex;align-items:center;gap:14px;padding:16px 0 13px}
.logo{font-family:var(--fd);font-weight:900;font-size:clamp(24px,3.6vw,36px);letter-spacing:-.03em;line-height:1;color:var(--ink);display:flex;align-items:baseline;gap:1px}
.logo-dot{width:9px;height:9px;background:var(--accent);border-radius:50%;align-self:flex-end;margin-bottom:7px}
.mast-loc{font-family:var(--fh);font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);border-left:2px solid var(--border2);padding-left:13px;line-height:1.4;white-space:nowrap}
.mast-loc strong{display:block;color:var(--ink2);font-size:12px;letter-spacing:.07em}
.mast-loc span{display:block}
.live-pill{display:none;align-items:center;gap:5px;font-family:var(--fh);font-weight:700;color:#fff;background:var(--green);padding:4px 11px;border-radius:var(--r-pill);font-size:11px;white-space:nowrap}
.live-pill.show{display:inline-flex}
.live-pill .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mast-right{margin-left:auto;display:flex;align-items:center;gap:9px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg2);border:2px solid var(--border2);border-radius:var(--r-pill);padding:9px 16px;transition:border-color .15s}
.search-box:focus-within{border-color:var(--accent)}
.search-box svg{color:var(--ink3);flex-shrink:0}
.search-box input{border:none;background:transparent;outline:none;font-family:var(--fh);font-size:14px;font-weight:500;color:var(--ink);width:140px}
.search-box input::placeholder{color:var(--ink3)}
.icon-btn{width:42px;height:42px;border-radius:var(--r-pill);background:var(--bg2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--ink2);transition:all .15s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn:active{transform:scale(.94)}
.mast-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:12px}
.mast-tabs::-webkit-scrollbar{display:none}
.mast-tab{font-family:var(--fh);font-weight:700;font-size:13px;padding:9px 18px;color:var(--ink2);border-radius:var(--r-pill);transition:all .14s;white-space:nowrap;display:flex;align-items:center;gap:7px;border:2px solid var(--border2)}
.mast-tab:hover{border-color:var(--ink2);color:var(--ink)}
.mast-tab.active{color:#fff;background:var(--accent);border-color:var(--accent)}
.badge{font-family:var(--fh);font-size:11px;font-weight:700;padding:1px 8px;border-radius:var(--r-pill);background:var(--bg3);color:var(--ink2);min-width:22px;text-align:center}
.mast-tab.active .badge{background:rgba(255,255,255,.25);color:#fff}

/* ── Weather ── */
.wx-bar{margin:14px 0 0}
.wx-inner{background:var(--accent);color:#fff;border-radius:var(--r);padding:12px 18px;display:flex;align-items:center;gap:13px;min-width:0}
.wx-tag{background:#fff;color:var(--accent-d);font-family:var(--fh);font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:4px 11px;border-radius:var(--r-pill);flex-shrink:0}
.wx-text{flex:1;font-family:var(--fh);font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wx-btns{display:flex;gap:5px;flex-shrink:0}
.wx-btns button{width:30px;height:30px;border-radius:var(--r-pill);background:rgba(255,255,255,.2);color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center}
.wx-btns button:hover:not(:disabled){background:rgba(255,255,255,.35)}
.wx-btns button:disabled{opacity:.3;cursor:default}

/* ── Filters ── */
.filters{display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:20px 0 4px}
.fl{font-family:var(--fh);font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-right:2px}
.filter-sep{flex-basis:100%;height:0}
.chip{font-family:var(--fh);font-size:13px;font-weight:600;color:var(--ink2);border:2px solid var(--border2);border-radius:var(--r-pill);padding:6px 14px;background:var(--card);transition:all .13s}
.chip:hover{border-color:var(--ink2);color:var(--ink)}
.chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* ── Feed ── */
.feed-wrap{padding:8px 0 70px}
.sec-head{display:flex;align-items:center;gap:13px;margin:38px 0 16px}
.sec-head h2{font-family:var(--fd);font-weight:700;font-size:22px;letter-spacing:-.01em}
.sec-head .rule{flex:1;height:2px;background:var(--border)}
.sec-count{font-family:var(--fh);font-size:12px;font-weight:700;color:var(--ink2);background:var(--bg2);padding:4px 12px;border-radius:var(--r-pill)}

.ttag{font-family:var(--fh);font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px;color:var(--tc,var(--ink3))}
.ttag .d{width:7px;height:7px;border-radius:50%;background:var(--tc,var(--ink3));flex-shrink:0}
.justin{font-family:var(--fh);font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);display:inline-flex;align-items:center;gap:5px}
.justin .d{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.6s infinite}
.art-badge{font-family:var(--fh);font-size:11px;font-weight:700;color:var(--green);display:inline-flex;align-items:center;gap:4px}

/* hero */
.hero{display:grid;grid-template-columns:1.05fr .95fr;background:var(--card);border:2px solid var(--ink);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px;transition:transform .18s}
.hero:hover{transform:translateY(-2px)}
.hero-img{position:relative;overflow:hidden;min-height:310px;background:var(--bg2)}
.hero-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s}
.hero-img img.vis{opacity:1}
.hero-body{padding:30px 34px;display:flex;flex-direction:column;gap:14px}
.hero-tags{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hero-body h2{font-family:var(--fd);font-weight:700;font-size:clamp(23px,2.5vw,34px);line-height:1.1;letter-spacing:-.02em}
.hero-lede{font-size:17px;color:var(--ink2)}
.meta{font-family:var(--fh);font-size:13px;color:var(--ink3);margin-top:auto;padding-top:16px;border-top:2px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta .via{font-weight:700;color:var(--ink2)}
.meta .dot{color:var(--border2)}

/* grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s,transform .15s}
.card:hover{border-color:var(--ink);transform:translateY(-3px)}
.card-img{aspect-ratio:16/10;overflow:hidden;position:relative;background:var(--bg2)}
.card-img img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s}
.card-img img.vis{opacity:1}
.card-body{padding:16px 18px 18px;flex:1;display:flex;flex-direction:column;gap:9px}
.card-body h3{font-family:var(--fd);font-weight:600;font-size:18px;line-height:1.2;color:var(--ink)}
.card-desc{font-size:15px;color:var(--ink2);line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{margin-top:auto;padding-top:12px;border-top:2px solid var(--border);font-family:var(--fh);font-size:12px;color:var(--ink3);display:flex;justify-content:space-between;gap:8px}
.card-foot .via{font-weight:600;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* rows */
.list{display:flex;flex-direction:column;gap:10px}
.row{display:grid;grid-template-columns:104px 1fr;background:var(--card);border:2px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.row:hover{border-color:var(--ink)}
.row-thumb{aspect-ratio:1;overflow:hidden;position:relative;background:var(--bg2)}
.row-thumb img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s}
.row-thumb img.vis{opacity:1}
.row-body{padding:13px 17px;display:flex;flex-direction:column;gap:5px;justify-content:center;min-width:0}
.row-body h4{font-family:var(--fd);font-weight:600;font-size:17px;line-height:1.22;color:var(--ink)}
.row-desc{font-size:14px;color:var(--ink2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.row-foot{font-family:var(--fh);font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:8px;margin-top:2px;flex-wrap:wrap}

/* obits */
.obit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.obit{background:var(--card);border:2px solid var(--border);border-left:5px solid var(--ink3);border-radius:var(--r);padding:24px 28px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s}
.obit:hover{border-color:var(--ink3);border-left-color:var(--ink2)}
.obit-orn{color:var(--ink3);font-size:13px;letter-spacing:.4em}
.obit h3{font-family:var(--fd);font-weight:600;font-size:21px;line-height:1.15;color:var(--ink)}
.obit-desc{font-size:15px;color:var(--ink2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.obit-foot{font-family:var(--fh);font-size:12px;color:var(--ink3);margin-top:auto;padding-top:11px;border-top:2px solid var(--border)}

/* states */
.load-wrap{text-align:center;padding:34px 0 0}
.load-btn{font-family:var(--fh);font-size:14px;font-weight:700;border:2px solid var(--ink);border-radius:var(--r-pill);padding:13px 40px;background:var(--card);color:var(--ink);transition:all .15s}
.load-btn:hover{background:var(--ink);color:var(--bg)}
.empty{padding:80px 24px;text-align:center;font-family:var(--fh);color:var(--ink3);font-size:15px}
.empty .big{font-family:var(--fd);font-size:25px;color:var(--ink2);margin-bottom:8px;display:block}
.spin{display:inline-block;width:34px;height:34px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Article ── */
.art{padding:30px 0 90px}
.back-btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--fh);font-size:13px;font-weight:700;color:var(--ink2);background:var(--card);border:2px solid var(--border2);border-radius:var(--r-pill);padding:9px 18px 9px 13px;margin-bottom:30px;transition:all .15s}
.back-btn:hover{border-color:var(--ink);color:var(--ink)}
.art-tags{display:flex;align-items:center;gap:13px;margin-bottom:14px;flex-wrap:wrap}
.art h1{font-family:var(--fd);font-weight:700;font-size:clamp(29px,5vw,46px);line-height:1.07;letter-spacing:-.025em;margin-bottom:18px;color:var(--ink)}
.byline{display:flex;align-items:center;gap:11px;flex-wrap:wrap;font-family:var(--fh);font-size:14px;color:var(--ink3);margin-bottom:26px;padding-bottom:22px;border-bottom:2px solid var(--border)}
.byline .via{font-weight:700;color:var(--ink2)}
.byline img{border-radius:5px}
.art-hero{position:relative;margin:0 0 34px;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:16/9;background:var(--tc,var(--ink3));border:2px solid var(--border)}
.art-hero img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s;position:relative;z-index:1}
.art-hero img.vis{opacity:1}
.art-hero .fill{z-index:0}
.art-body{font-size:20px;line-height:1.8;color:var(--ink);margin-bottom:34px}
.art-body p{margin-bottom:1.3em}
.art-body p:last-child{margin-bottom:0}
.art-body p:first-of-type::first-letter{font-family:var(--fd);font-weight:900;font-size:3.2em;float:left;line-height:.82;margin:.04em .12em -.04em 0;color:var(--accent)}
.srcbox{display:flex;align-items:flex-start;gap:14px;padding:18px 22px;background:var(--bg2);border-radius:var(--r);font-family:var(--fh);font-size:14px;color:var(--ink2);line-height:1.6;margin-bottom:22px}
.srcbox svg{flex-shrink:0;margin-top:2px;color:var(--ink3)}
.srcbox a{color:var(--blue);font-weight:700;text-decoration:underline;text-underline-offset:2px}
.read-orig{display:inline-flex;align-items:center;gap:8px;font-family:var(--fh);font-size:14px;font-weight:700;background:var(--ink);color:var(--bg);padding:14px 28px;border-radius:var(--r-pill);margin-bottom:30px;transition:transform .15s}
.read-orig:hover{transform:translateY(-2px)}
.share-row{display:flex;gap:9px;margin-bottom:34px;flex-wrap:wrap}
.share-btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--fh);font-size:13px;font-weight:700;padding:11px 20px;border-radius:var(--r-pill);border:2px solid var(--border2);color:var(--ink);background:var(--card);transition:all .15s}
.share-btn:hover{border-color:var(--ink)}
.share-btn.fb{background:#1877f2;border-color:#1877f2;color:#fff}
.ad{padding:28px;border:2px dashed var(--border2);border-radius:var(--r-lg);text-align:center;margin:6px 0 34px;background:var(--bg2)}
.ad-eye{font-family:var(--fh);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:7px}
.ad-hed{font-family:var(--fd);font-weight:700;font-size:21px;color:var(--ink);margin-bottom:5px}
.ad-sub{font-family:var(--fh);font-size:15px;color:var(--ink2)}
.ad-sub a{color:var(--accent);font-weight:700}
.rel{margin-top:40px;padding-top:26px;border-top:2px solid var(--ink)}
.rel h3{font-family:var(--fd);font-weight:700;font-size:19px;margin-bottom:14px}
.rel-link{display:flex;align-items:center;gap:11px;padding:13px 17px;background:var(--card);border:2px solid var(--border);border-radius:var(--r);margin-bottom:9px;font-family:var(--fh);font-size:14px;font-weight:600;color:var(--ink);transition:all .15s}
.rel-link:hover{border-color:var(--ink)}
.rel-link .ext{color:var(--ink3);font-weight:400;margin-left:auto}

footer{border-top:2px solid var(--ink);padding:26px 0 40px;font-family:var(--fh);font-size:13px;color:var(--ink3);background:var(--bg2)}
.foot-inner{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;align-items:center}
.foot-brand{font-family:var(--fd);font-weight:700;font-size:17px;color:var(--ink2);display:flex;align-items:baseline;gap:1px}
.foot-brand .logo-dot{width:6px;height:6px;margin-bottom:3px}
footer a{color:var(--ink2);font-weight:600;text-decoration:underline}
footer a:hover{color:var(--accent)}

@media(max-width:920px){
  .hero{grid-template-columns:1fr}.hero-img{min-height:220px}.hero-body{padding:24px}
  .grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  body{font-size:16px}
  .wrap,.wrap-narrow{padding:0 15px}
  .mast-loc{display:none}
  .search-box input{width:0;padding:0}.search-box:focus-within input{width:118px}
  .grid,.obit-grid{grid-template-columns:1fr}
  .hero-body h2{font-size:23px}.art-body{font-size:18px}
  .row{grid-template-columns:90px 1fr}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>

};
window.getArticleById = async (id) => {
  try { const snap = await getDoc(doc(db,'articles',id)); return snap.exists()?snap.data():null; }
  catch(e){ console.warn('FS read:',e.message); return null; }
};

function renderHome(){

function renderStories(items){const vis=items.slice(0,S.vis);if(!vis.length)return'';const[hero,...rest]=vis;let html=heroHtml(hero);if(rest.length){const grid=rest.slice(0,6),list=rest.slice(6);if(grid.length)html+=`<div class="grid">${grid.map(cardHtml).join('')}</div>`;if(list.length){html+=`<div class="sec-head"><h2>More stories</h2><div class="rule"></div><span class="sec-count">${list.length}</span></div><div class="list">${list.map(rowHtml).join('')}</div>`;}}if(items.length>S.vis)html+=`<div class="load-wrap"><button class="load-btn" id="load-more">Load more stories</button></div>`;return html;}

async function renderArticle(id){

  $('#art-back')?.addEventListener('click',()=>navTo('/'));
}
function drawArticle(it){
  setArticleSeo(it);if(typeof window.saveArticleToFirestore==='function')window.saveArticleToFirestore(it);
  const t=getTitle(it);const hasArticle=!!it.article&&it.topic!=='obituaries';
  const favicon=it.source?`https://www.google.com/s2/favicons?sz=32&domain=${encodeURIComponent(it.source)}`:'';

  const heroImg=it.image
    ? `<img src="${esc(proxyImg(it.image))}" alt="${esc(t)}" onload="this.classList.add('vis')" onerror="this.style.display='none'">`
    : fillHtml(it.topic);
  $('#app').innerHTML=`<div class="wrap-narrow art t-${it.topic||'community'}">
    <button class="back-btn" id="art-back"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>Back to news</button>
    <div class="art-tags">${tagHtml(it.topic)}${it.article?`<span class="art-badge">✦ Written by TownFeed</span>`:''}</div>
    <h1>${esc(t)}</h1>
    <div class="byline">${favicon?`<img src="${esc(favicon)}" width="20" height="20" alt="" onerror="this.remove()">`:''}<span class="via">${esc(it.sourceName||it.source||'Local')}</span><span class="dot">•</span><time datetime="${esc(it.pubDate)}">${ago(it.pubDate)||'Recently'}</time></div>
    <div class="art-hero ${it.image?'':'noimg'}">${heroImg}</div>
    ${body}
    <div class="srcbox"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div>${hasArticle?`This article was written by <strong>TownFeed</strong> using reporting from <a href="${esc(it.realLink||it.link)}" target="_blank" rel="noopener nofollow">${esc(it.sourceName||it.source)}</a>. Only facts from the original report are included.`:`Reported by <a href="${esc(it.realLink||it.link)}" target="_blank" rel="noopener nofollow">${esc(it.sourceName||it.source)}</a>.`}</div></div>
    <a class="read-orig" href="${esc(it.realLink||it.link)}" target="_blank" rel="noopener nofollow">Read the full story at ${esc(it.sourceName||it.source||'the source')} ↗</a>
    <div class="share-row"><a class="share-btn fb" href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}" target="_blank" rel="noopener"><svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>Share</a><button class="share-btn" id="copy-btn"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy link</button></div>
    <div class="ad"><div class="ad-eye">Reach all of ${esc(edName())}</div><div class="ad-hed">Advertise with TownFeed</div><div class="ad-sub">Connect with readers across the county. <a href="mailto:${CFG.AD}?subject=TownFeed%20Advertising">Get started ↗</a></div></div>
    ${related.length?`<div class="rel"><h3>More coverage of this story</h3>${related.map(r=>`<a class="rel-link" href="${esc(r.link)}" target="_blank" rel="noopener nofollow">${r.source?`<img src="https://www.google.com/s2/favicons?sz=24&domain=${encodeURIComponent(r.source)}" width="18" height="18" style="border-radius:4px" alt="" onerror="this.remove()">`:''}<span>${esc(r.sourceName||r.source||'Source')}</span><span class="ext">↗</span></a>`).join('')}</div>`:''}
  </div>`;
  $('#art-back')?.addEventListener('click',()=>{navTo('/');setTimeout(()=>window.scrollTo(0,S.scrollY||0),50);});
  $('#copy-btn')?.addEventListener('click',function(){navigator.clipboard?.writeText(`https://townfeed.app/article/${it.id}`);this.innerHTML='✓ Copied!';});
}
function renderFoot(){if(!S.data)return;const m=S.data.meta||{};const n=S.data.news?.length||0,sp=S.data.sports?.length||0,ob=S.data.obits?.length||0;const tot=m.archiveTotal?` · ${m.archiveTotal} stories archived`:'';$('#foot-meta').textContent=`Updated ${m.lastRun?ago(m.lastRun):'recently'} · ${n} news · ${sp} sports · ${ob} obits${tot}`;}
})();
</script>
</body>
</html>
