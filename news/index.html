<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,sans-serif;font-size:16px;line-height:1.55;min-height:100vh;transition:background .2s,color .2s;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}
::selection{background:var(--sky);color:#fff}

:root{
  --bg:#eaf4ff;            /* soft sky canvas */
  --bg2:#dceeff;
  --card:#ffffff;
  --ink:#0f2740;          /* deep navy ink */
  --ink2:#54708c;
  --ink3:#90a6bd;
  --border:#e3eef9;
  --sky:#1d9bf6;          /* hero sky blue */
  --sky-d:#1683d8;
  --sky-soft:#e8f4ff;
  /* topic colors — bright, solid, friendly */
  --c-crime:#ff5a5f; --c-sports:#3b82f6; --c-schools:#22b07d; --c-weather:#f5a623;
  --c-government:#8b5cf6; --c-agriculture:#84cc16; --c-business:#fb923c; --c-events:#06b6d4;
  --c-community:#ec4899; --c-obituaries:#64748b;
  --fh:'Nunito',system-ui,sans-serif;
  --r-sm:14px;--r:20px;--r-lg:26px;--r-xl:32px;--r-pill:999px;
  --sh-sm:0 2px 6px rgba(29,107,180,.08);
  --sh:0 6px 18px rgba(29,107,180,.12);
  --sh-lg:0 14px 36px rgba(29,107,180,.18);
  --sh-sky:0 8px 22px rgba(29,155,246,.32);
}
[data-theme=dark]{
  --bg:#0b1623;--bg2:#111f30;--card:#16263a;--ink:#eaf2fb;--ink2:#9fb6cf;--ink3:#5f7790;--border:#22344a;
  --sky:#3ba9ff;--sky-d:#5cb8ff;--sky-soft:#16263a;
  --c-crime:#ff6b70; --c-sports:#5b9bff; --c-schools:#34c98e; --c-weather:#fbb43c;
  --c-government:#a484f5; --c-agriculture:#9fde2e; --c-business:#fda04f; --c-events:#22c9dd;
  --c-community:#f56baf; --c-obituaries:#8295a8;
  --sh-sm:0 2px 6px rgba(0,0,0,.3);--sh:0 6px 18px rgba(0,0,0,.4);--sh-lg:0 14px 36px rgba(0,0,0,.5);
  --sh-sky:0 8px 22px rgba(59,169,255,.3);
}

/* topic accent var per card */
.t-crime{--tc:var(--c-crime)}.t-sports{--tc:var(--c-sports)}.t-schools{--tc:var(--c-schools)}
.t-weather{--tc:var(--c-weather)}.t-government{--tc:var(--c-government)}.t-agriculture{--tc:var(--c-agriculture)}
.t-business{--tc:var(--c-business)}.t-events{--tc:var(--c-events)}.t-community{--tc:var(--c-community)}
.t-obituaries{--tc:var(--c-obituaries)}

.fill{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--tc,var(--sky))}
.fill svg{width:30%;max-width:60px;height:auto;stroke:#fff;opacity:.92}

.wrap{max-width:1180px;margin:0 auto;padding:0 20px}
.wrap-narrow{max-width:680px;margin:0 auto;padding:0 20px}

/* ── Masthead ── */
.mast{background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(16px) saturate(1.5);-webkit-backdrop-filter:blur(16px) saturate(1.5);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.mast-top{display:flex;align-items:center;gap:14px;padding:15px 0 12px}
.logo{font-family:var(--fh);font-weight:900;font-size:clamp(23px,3.4vw,32px);letter-spacing:-.02em;line-height:1;color:var(--ink);display:flex;align-items:center;gap:1px}
.logo-dot{width:10px;height:10px;background:var(--sky);border-radius:50%;flex-shrink:0;margin:0 1px}
.mast-loc{font-family:var(--fh);font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);border-left:2px solid var(--border);padding-left:13px;line-height:1.4;white-space:nowrap}
.mast-loc strong{display:block;color:var(--ink2);font-size:12px}
.mast-loc span{display:block}
.live-pill{display:none;align-items:center;gap:5px;font-family:var(--fh);font-weight:800;color:#fff;background:var(--c-schools);padding:5px 12px;border-radius:var(--r-pill);font-size:11px;white-space:nowrap}
.live-pill.show{display:inline-flex;animation:pop .4s cubic-bezier(.3,1.5,.5,1)}
@keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
.live-pill .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mast-right{margin-left:auto;display:flex;align-items:center;gap:9px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:2px solid var(--border);border-radius:var(--r-pill);padding:10px 17px;transition:all .18s;box-shadow:var(--sh-sm)}
.search-box:focus-within{border-color:var(--sky);box-shadow:var(--sh-sky)}
.search-box svg{color:var(--ink3);flex-shrink:0}
.search-box input{border:none;background:transparent;outline:none;font-family:var(--fh);font-size:14px;font-weight:600;color:var(--ink);width:150px}
.search-box input::placeholder{color:var(--ink3)}
.icon-btn{width:44px;height:44px;border-radius:var(--r-pill);background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--sky);transition:all .18s;box-shadow:var(--sh-sm)}
.icon-btn:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.icon-btn:active{transform:scale(.92)}
.mast-tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:13px}
.mast-tabs::-webkit-scrollbar{display:none}
.mast-tab{font-family:var(--fh);font-weight:800;font-size:14px;padding:10px 20px;color:var(--ink2);border-radius:var(--r-pill);transition:all .16s;white-space:nowrap;background:var(--card);border:2px solid var(--border);box-shadow:var(--sh-sm);display:inline-flex;align-items:center;gap:8px}
.mast-tab svg{flex-shrink:0}
.mast-tab:hover{transform:translateY(-2px);box-shadow:var(--sh);color:var(--ink)}
.mast-tab.active{color:#fff;background:var(--sky);border-color:var(--sky);box-shadow:var(--sh-sky)}

/* ── Weather ── */
.wx-bar{margin:16px 0 0}
.wx-inner{background:var(--c-weather);color:#3a2a00;border-radius:var(--r);padding:14px 20px;display:flex;align-items:center;gap:13px;min-width:0;box-shadow:var(--sh);font-weight:700}
.wx-tag{background:rgba(255,255,255,.85);color:#7a4f00;font-family:var(--fh);font-size:11px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;padding:5px 12px;border-radius:var(--r-pill);flex-shrink:0}
.wx-text{flex:1;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wx-btns{display:flex;gap:6px;flex-shrink:0}
.wx-btns button{width:32px;height:32px;border-radius:var(--r-pill);background:rgba(255,255,255,.45);color:#3a2a00;font-size:17px;font-weight:900;display:flex;align-items:center;justify-content:center}
.wx-btns button:hover:not(:disabled){background:#fff}
.wx-btns button:disabled{opacity:.35;cursor:default}

/* ── Filters ── */
.filters{display:flex;flex-wrap:wrap;gap:9px;align-items:center;padding:20px 0 6px}
.fl{font-family:var(--fh);font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-right:3px}
.filter-sep{flex-basis:100%;height:0}
.chip{font-family:var(--fh);font-size:14px;font-weight:800;color:var(--ink2);border:2px solid var(--border);border-radius:var(--r-pill);padding:8px 17px;background:var(--card);transition:all .15s;box-shadow:var(--sh-sm);display:inline-flex;align-items:center;gap:7px}
.chip .cdot{width:9px;height:9px;border-radius:50%;background:var(--cc,var(--sky))}
.chip:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.chip.on{color:#fff;border-color:transparent;background:var(--cc,var(--sky));box-shadow:0 6px 16px color-mix(in srgb,var(--cc,var(--sky)) 35%,transparent)}
.chip.on .cdot{background:rgba(255,255,255,.9)}
.chip-town.on{background:var(--sky);box-shadow:var(--sh-sky)}

/* ── Feed: masonry-ish columns for that pinterest feel ── */
.feed-wrap{padding:14px 0 80px;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.sec-head{display:flex;align-items:center;gap:12px;margin:30px 0 16px}
.sec-head h2{font-family:var(--fh);font-weight:900;font-size:22px;letter-spacing:-.01em;color:var(--ink)}
.sec-head .rule{flex:1;height:3px;border-radius:3px;background:var(--border)}

/* hero feature card */
.hero{display:grid;grid-template-columns:1.05fr .95fr;background:var(--card);border-radius:var(--r-xl);overflow:hidden;margin-bottom:18px;box-shadow:var(--sh);transition:transform .2s cubic-bezier(.3,1.2,.4,1),box-shadow .2s}
.hero:hover{transform:translateY(-4px);box-shadow:var(--sh-lg)}
.hero-img{position:relative;overflow:hidden;min-height:320px;background:var(--tc,var(--sky))}
.hero-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .45s,transform .5s}
.hero-img img.vis{opacity:1}
.hero:hover .hero-img img{transform:scale(1.05)}
.hero-body{padding:30px 32px;display:flex;flex-direction:column;gap:14px}
.hero-tags{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hero-body h2{font-family:var(--fh);font-weight:900;font-size:clamp(23px,2.5vw,32px);line-height:1.12;letter-spacing:-.02em;color:var(--ink)}
.hero-lede{font-size:16px;font-weight:600;color:var(--ink2);line-height:1.5}
.meta{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--ink3);margin-top:auto;padding-top:16px;border-top:2px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta .via{font-weight:800;color:var(--ink2)}
.meta .dot{opacity:.5}

/* masonry columns */
.masonry{column-count:3;column-gap:18px}
@media(max-width:900px){.masonry{column-count:2}}
@media(max-width:560px){.masonry{column-count:1}}
.card{break-inside:avoid;margin-bottom:18px;background:var(--card);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-sm);transition:transform .2s cubic-bezier(.3,1.2,.4,1),box-shadow .2s;display:block}
.card:hover{transform:translateY(-5px);box-shadow:var(--sh-lg)}
.card-img{overflow:hidden;position:relative;background:var(--tc,var(--sky))}
.card-img img{width:100%;display:block;opacity:0;transition:opacity .4s,transform .5s}
.card-img img.vis{opacity:1}
.card:hover .card-img img{transform:scale(1.05)}
.card-img.noimg{aspect-ratio:16/10}
.card-body{padding:17px 19px 19px;display:flex;flex-direction:column;gap:10px}
.card-body h3{font-family:var(--fh);font-weight:800;font-size:18px;line-height:1.22;letter-spacing:-.01em;color:var(--ink)}
.card-desc{font-size:14.5px;font-weight:600;color:var(--ink2);line-height:1.45}
.card-foot{padding-top:11px;border-top:2px solid var(--border);font-family:var(--fh);font-size:12px;font-weight:700;color:var(--ink3);display:flex;justify-content:space-between;gap:8px;align-items:center}
.card-foot .via{font-weight:800;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* topic pill — full color */
.ttag{font-family:var(--fh);font-size:11px;font-weight:900;letter-spacing:.03em;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px;color:#fff;background:var(--tc,var(--sky));padding:5px 11px;border-radius:var(--r-pill);align-self:flex-start}
.justin{font-family:var(--fh);font-size:11px;font-weight:900;letter-spacing:.03em;text-transform:uppercase;color:#fff;background:var(--c-crime);padding:5px 11px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:5px}
.justin .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.5s infinite}
.art-badge{font-family:var(--fh);font-size:11px;font-weight:900;color:#fff;background:var(--c-schools);padding:5px 11px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:4px}

/* obits — soft, respectful, still rounded */
.obit{break-inside:avoid;margin-bottom:18px;background:var(--card);border-radius:var(--r-lg);padding:24px 26px;box-shadow:var(--sh-sm);transition:transform .2s,box-shadow .2s;display:block;border-top:5px solid var(--c-obituaries)}
.obit:hover{transform:translateY(-4px);box-shadow:var(--sh)}
.obit-orn{color:var(--c-obituaries);font-size:13px;letter-spacing:.4em;margin-bottom:8px}
.obit h3{font-family:var(--fh);font-weight:800;font-size:20px;line-height:1.18;color:var(--ink);margin-bottom:8px}
.obit-desc{font-size:14.5px;font-weight:600;color:var(--ink2);line-height:1.5}
.obit-foot{font-family:var(--fh);font-size:12px;font-weight:700;color:var(--ink3);margin-top:12px;padding-top:11px;border-top:2px solid var(--border)}

/* infinite-scroll sentinel + loader */
.scroll-load{text-align:center;padding:30px 0}
.scroll-load .spin{display:inline-block;width:30px;height:30px;border:4px solid var(--border);border-top-color:var(--sky);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:80px 24px;text-align:center;font-family:var(--fh);color:var(--ink3);font-size:16px;font-weight:700}
.empty .big{font-size:26px;font-weight:900;color:var(--ink2);margin-bottom:8px;display:block}

/* ── Article page ── */
.art{padding:26px 0 90px;animation:fade .4s ease}
.back-btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--fh);font-size:14px;font-weight:800;color:var(--sky);background:var(--card);border:2px solid var(--border);border-radius:var(--r-pill);padding:10px 19px 10px 14px;margin-bottom:26px;transition:all .18s;box-shadow:var(--sh-sm)}
.back-btn:hover{transform:translateX(-3px);box-shadow:var(--sh)}
.art-tags{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.art h1{font-family:var(--fh);font-weight:900;font-size:clamp(28px,5vw,42px);line-height:1.1;letter-spacing:-.02em;margin-bottom:18px;color:var(--ink)}
.byline{display:flex;align-items:center;gap:11px;flex-wrap:wrap;font-family:var(--fh);font-size:14px;font-weight:700;color:var(--ink3);margin-bottom:24px;padding-bottom:22px;border-bottom:2px solid var(--border)}
.byline .via{font-weight:800;color:var(--ink2)}
.byline img{border-radius:7px}
.art-hero{position:relative;margin:0 0 30px;border-radius:var(--r-xl);overflow:hidden;aspect-ratio:16/9;background:var(--tc,var(--sky));box-shadow:var(--sh)}
.art-hero img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s;position:relative;z-index:1}
.art-hero img.vis{opacity:1}
.art-body{font-size:19px;font-weight:600;line-height:1.75;color:var(--ink);margin-bottom:32px}
.art-body p{margin-bottom:1.25em}
.art-body p:last-child{margin-bottom:0}
.srcbox{display:flex;align-items:flex-start;gap:13px;padding:18px 22px;background:var(--sky-soft);border-radius:var(--r);font-size:14px;font-weight:700;color:var(--ink2);line-height:1.6;margin-bottom:22px}
.srcbox svg{flex-shrink:0;margin-top:2px;color:var(--sky)}
.srcbox a{color:var(--sky-d);font-weight:900;text-decoration:underline;text-underline-offset:2px}
.read-orig{display:inline-flex;align-items:center;gap:8px;font-family:var(--fh);font-size:15px;font-weight:900;background:var(--sky);color:#fff;padding:15px 30px;border-radius:var(--r-pill);margin-bottom:30px;transition:transform .18s,box-shadow .18s;box-shadow:var(--sh-sky)}
.read-orig:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}
.share-row{display:flex;gap:10px;margin-bottom:32px;flex-wrap:wrap}
.share-btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--fh);font-size:14px;font-weight:800;padding:12px 22px;border-radius:var(--r-pill);border:2px solid var(--border);color:var(--ink);background:var(--card);transition:all .18s;box-shadow:var(--sh-sm)}
.share-btn:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.share-btn.fb{background:#1877f2;border-color:#1877f2;color:#fff}
.ad{padding:28px;border-radius:var(--r-xl);text-align:center;margin:6px 0 32px;background:var(--sky-soft);border:2px dashed color-mix(in srgb,var(--sky) 40%,transparent)}
.ad-eye{font-family:var(--fh);font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--sky-d);margin-bottom:7px}
.ad-hed{font-family:var(--fh);font-weight:900;font-size:22px;color:var(--ink);margin-bottom:5px}
.ad-sub{font-family:var(--fh);font-size:15px;font-weight:700;color:var(--ink2)}
.ad-sub a{color:var(--sky-d);font-weight:900}
.rel{margin-top:38px;padding-top:24px;border-top:3px solid var(--border)}
.rel h3{font-family:var(--fh);font-weight:900;font-size:20px;margin-bottom:14px}
.rel-link{display:flex;align-items:center;gap:11px;padding:14px 18px;background:var(--card);border:2px solid var(--border);border-radius:var(--r);margin-bottom:10px;font-family:var(--fh);font-size:14px;font-weight:800;color:var(--ink);transition:all .18s;box-shadow:var(--sh-sm)}
.rel-link:hover{transform:translateX(3px);box-shadow:var(--sh);border-color:var(--sky)}
.rel-link .ext{color:var(--ink3);margin-left:auto}

footer{padding:30px 0 44px;font-family:var(--fh);font-size:13px;font-weight:700;color:var(--ink3)}
.foot-inner{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;align-items:center}
.foot-brand{font-family:var(--fh);font-weight:900;font-size:18px;color:var(--ink2);display:flex;align-items:center;gap:1px}
.foot-brand .logo-dot{width:7px;height:7px}
footer a{color:var(--sky-d);font-weight:800;text-decoration:underline}

@media(max-width:900px){.hero{grid-template-columns:1fr}.hero-img{min-height:230px}.hero-body{padding:24px}}
@media(max-width:560px){
  .wrap,.wrap-narrow{padding:0 14px}
  .mast-loc{display:none}
  .search-box input{width:0;padding:0}.search-box:focus-within input{width:120px}
  .hero-body h2{font-size:23px}.art-body{font-size:17px}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

const ICONS={crime:'<svg fill="none" stroke-width="1.6" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',sports:'<svg fill="none" stroke-width="1.6" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><line x1="2" y1="12" x2="22" y2="12"/></svg>',schools:'<svg fill="none" stroke-width="1.6" viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>',weather:'<svg fill="none" stroke-width="1.6" viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></svg>',government:'<svg fill="none" stroke-width="1.6" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',agriculture:'<svg fill="none" stroke-width="1.6" viewBox="0 0 24 24"><path d="M12 22V9"/><path d="M7 12C4 10 2 7 2 4c3 0 6 1 8 4"/><path d="M17 12c3-2 5-5 5-8-3 0-6 1-8 4"/></svg>',business:'<svg fill="none" stroke-width="1.6" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>',events:'<svg fill="none" stroke-width="1.6" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',community:'<svg fill="none" stroke-width="1.6" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>',obituaries:'<svg fill="none" stroke-width="1.6" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'};
function fillHtml(topic){const t=topic||'community';return`<div class="fill">${ICONS[t]||ICONS.community}</div>`;}
const TAG_LABELS={crime:'Crime',sports:'Sports',schools:'Schools',weather:'Weather',government:'Government',agriculture:'Agriculture',business:'Business',events:'Events',community:'Community',obituaries:'Obituary'};
function tagHtml(t){const c=t||'community';return`<span class="ttag t-${c}">${esc(TAG_LABELS[c]||'News')}</span>`;}
function getTitle(it){return it.articleTitle||it.title||'';}
function getLede(it){if(it.article){const f=it.article.split('\n\n')[0]||'';if(f.length>30)return cleanText(f).slice(0,180)+(f.length>180?'…':'');}return cleanText(it.description||'');}

function getRoute(){const p=location.pathname;if(p.startsWith('/article/'))return{view:'article',id:decodeURIComponent(p.slice(9))};const h=location.hash.replace(/^#/,'')||'/';if(h.startsWith('/a/'))return{view:'article',id:decodeURIComponent(h.slice(3))};return{view:'home'};}

const S={data:null,etag:null,tab:'news',topics:new Set(),towns:new Set(),q:'',vis:CFG.PAGE,wIdx:0,scrollY:0,edition:null,fetchedArticle:null,io:null};

function applyTheme(t){document.documentElement.setAttribute('data-theme',t);$('meta[name=theme-color]').content=t==='dark'?'#0b1623':'#eaf4ff';$('#ico-sun').style.display=t==='dark'?'block':'none';$('#ico-moon').style.display=t==='dark'?'none':'block';}
applyTheme(localStorage.getItem('tf-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));
$('#theme-btn').addEventListener('click',()=>{const n=document.documentElement.dataset.theme==='dark'?'light':'dark';localStorage.setItem('tf-theme',n);applyTheme(n);});
$('#logo-link').addEventListener('click',e=>{e.preventDefault();S.q='';$('#q').value='';S.vis=CFG.PAGE;S.topics.clear();S.towns.clear();S.tab='news';navTo('/');});

function applyEdition(cfg){if(!cfg)return;S.edition=cfg;if(Array.isArray(cfg.towns)&&cfg.towns.length)CFG.TOWNS=cfg.towns;if(Array.isArray(cfg.topics)&&cfg.topics.length)CFG.TOPICS=cfg.topics;const ml=$('#mast-loc');if(ml)ml.innerHTML=`<strong>${esc(cfg.name||'')}</strong><span>${esc(cfg.state||'')}</span>`;}
function loadCache(){try{const r=localStorage.getItem(CFG.CACHE);if(!r)return null;const{data,etag}=JSON.parse(r);if(data?.news){S.data=data;S.etag=etag;applyEdition(data.meta&&data.meta.editionConfig);return data;}}catch{}return null;}

let fetching=false;
async function fetchFeed(force){if(fetching)return;fetching=true;try{const h={};if(S.etag&&!force)h['If-None-Match']=S.etag;const r=await fetch(CFG.WORKER+'/feed',{headers:h});if(r.status===304)return;if(!r.ok)throw new Error('HTTP '+r.status);S.data=await r.json();S.etag=r.headers.get('ETag');applyEdition(S.data.meta&&S.data.meta.editionConfig);saveCache();render();const pill=$('#live-pill');pill.classList.add('show');setTimeout(()=>pill.classList.remove('show'),4500);}catch(e){if(!S.data)$('#app').innerHTML=`<div class="wrap"><div class="empty"><span class="big">Couldn't load the feed</span>${esc(e.message)}</div></div>`;}finally{fetching=false;}}
(async()=>{if(loadCache())render();await fetchFeed(true);setInterval(()=>{if(!document.hidden)fetchFeed();},CFG.REFRESH);document.addEventListener('visibilitychange',()=>{if(!document.hidden)fetchFeed();});})();

function render(){const route=getRoute();if(route.view==='article'){renderArticle(route.id);return;}if(!S.data)return;renderWx();resetSeo();renderHome();renderFoot();}
function renderWx(){const wx=S.data?.weather||[];const bar=$('#wx-bar');if(!wx.length){bar.innerHTML='';return;}const idx=Math.min(S.wIdx,wx.length-1),a=wx[idx];bar.innerHTML=`<div class="wx-bar"><div class="wx-inner"><span class="wx-tag">⚠ ${esc(a.event)}</span><span class="wx-text">${esc((a.headline||a.description||'').slice(0,150))}</span>${wx.length>1?`<span class="wx-btns"><button id="wx-p"${idx===0?' disabled':''}>‹</button><button id="wx-n"${idx===wx.length-1?' disabled':''}>›</button></span>`:''}</div></div>`;$('#wx-p')?.addEventListener('click',()=>{S.wIdx=Math.max(0,S.wIdx-1);renderWx();});$('#wx-n')?.addEventListener('click',()=>{S.wIdx=Math.min(wx.length-1,S.wIdx+1);renderWx();});}

function currentItems(){
  const allSearch=S.q?[...(S.data.news||[]),...(S.data.sports||[]),...(S.data.obits||[])].filter(it=>(getTitle(it)+' '+(it.description||'')+' '+(it.sourceName||'')).toLowerCase().includes(S.q)):null;
  const raw=allSearch||(S.tab==='news'?S.data.news:S.tab==='sports'?S.data.sports:S.data.obits)||[];

}
function topicColorVar(s){return `--cc:var(--c-${s})`;}
function renderHome(){

  if(S.tab==='news'&&!S.q){
    html+=`<div class="filters"><span class="fl">Topic</span>${CFG.TOPICS.map(([s,n])=>`<button class="chip${S.topics.has(s)?' on':''}" style="${topicColorVar(s)}" data-topic="${s}"><span class="cdot"></span>${n}</button>`).join('')}<span class="filter-sep"></span><span class="fl">Town</span>${CFG.TOWNS.map(([s,n])=>`<button class="chip chip-town${S.towns.has(s)?' on':''}" data-town="${s}">${n}</button>`).join('')}</div>`;
  }
  if(S.q)html+=`<div class="sec-head"><h2>Results for "${esc(S.q)}"</h2><div class="rule"></div></div>`;
  if(!items.length){html+=`<div class="empty"><span class="big">Nothing here yet</span>${S.q?`No matches for "${esc(S.q)}".`:'Try clearing your filters.'}</div></div>`;$('#app').innerHTML=html;wireHome();return;}
  html+=`<div id="feed-body"></div><div class="scroll-load" id="scroll-load" style="display:none"><span class="spin"></span></div></div>`;

  S.vis=CFG.PAGE;
  renderBatch(true);
  wireHome();
  setupInfinite();
}
function renderBatch(first){
  const items=currentItems();

    body.innerHTML=`<div class="masonry">${slice.map(obitHtml).join('')}</div>`;
  }else{
    let html='';
    const[hero,...rest]=slice;
    if(first&&hero)html+=heroHtml(hero);

function obitHtml(it){const d=cleanText(it.description||'');return`<a class="obit" href="${aUrl(it)}" data-nav><div class="obit-orn">✦ ✦ ✦</div><h3>${esc(it.title)}</h3>${d?`<div class="obit-desc">${esc(d)}</div>`:''}<div class="obit-foot">${esc(it.sourceName||'')} · ${ago(it.pubDate)}</div></a>`;}
function heroHtml(it){return`<a class="hero t-${it.topic||'community'}" href="${aUrl(it)}" data-nav><div class="hero-img">${it.image?`<img src="${esc(proxyImg(it.image))}" alt="${esc(getTitle(it))}" onload="this.classList.add('vis')" onerror="this.style.display='none'">`:fillHtml(it.topic)}</div><div class="hero-body"><div class="hero-tags">${tagHtml(it.topic)}${isNew(it)?`<span class="justin"><span class="d"></span>Just in</span>`:''}${it.article?`<span class="art-badge">✦ Full story</span>`:''}</div><h2>${esc(getTitle(it))}</h2>${getLede(it)?`<div class="hero-lede">${esc(getLede(it))}</div>`:''}<div class="meta"><span class="via">${esc(it.sourceName||'Local')}</span><span class="dot">•</span><span>${ago(it.pubDate)}</span></div></div></a>`;}

function setupInfinite(){

async function renderArticle(id){
  let it=null;

  if(!it&&S.fetchedArticle&&S.fetchedArticle.id===id)it=S.fetchedArticle;
  if(it){drawArticle(it);return;}
  $('#app').innerHTML=`<div class="wrap-narrow art"><div class="empty"><span class="spin" style="display:inline-block;width:30px;height:30px;border:4px solid var(--border);border-top-color:var(--sky);border-radius:50%;animation:spin .7s linear infinite"></span><br><br>Loading story…</div></div>`;
  let fetched=null;if(typeof window.getArticleById==='function'){try{fetched=await window.getArticleById(id);}catch{}}
  if(fetched){S.fetchedArticle=fetched;drawArticle(fetched);return;}
  $('#app').innerHTML=`<div class="wrap-narrow art"><button class="back-btn" id="art-back">‹ Back to news</button><div class="empty"><span class="big">Story not found</span>This story may no longer be available.</div></div>`;
  $('#art-back')?.addEventListener('click',()=>navTo('/'));
}
function drawArticle(it){
  setArticleSeo(it);if(typeof window.saveArticleToFirestore==='function')window.saveArticleToFirestore(it);
  const t=getTitle(it);const hasArticle=!!it.article&&it.topic!=='obituaries';
  const favicon=it.source?`https://www.google.com/s2/favicons?sz=32&domain=${encodeURIComponent(it.source)}`:'';
  const related=(it.related||[]).filter(r=>r.link);const shareUrl=encodeURIComponent(`https://townfeed.app/article/${it.id}`);
  let body='';
  if(hasArticle){const paras=it.article.split(/\n\n+/).filter(p=>p.trim()).map(p=>cleanText(p));body=`<div class="art-body">${paras.map(p=>`<p>${esc(p)}</p>`).join('')}</div>`;}
  else if(it.description){body=`<div class="art-body"><p>${esc(cleanText(it.description))}</p></div>`;}
  const heroImg=it.image?`<img src="${esc(proxyImg(it.image))}" alt="${esc(t)}" onload="this.classList.add('vis')" onerror="this.style.display='none'">`:fillHtml(it.topic);
  $('#app').innerHTML=`<div class="wrap-narrow art t-${it.topic||'community'}">
    <button class="back-btn" id="art-back"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>Back to news</button>
    <div class="art-tags">${tagHtml(it.topic)}${it.article?`<span class="art-badge">✦ Written by TownFeed</span>`:''}</div>
    <h1>${esc(t)}</h1>
    <div class="byline">${favicon?`<img src="${esc(favicon)}" width="20" height="20" alt="" onerror="this.remove()">`:''}<span class="via">${esc(it.sourceName||it.source||'Local')}</span><span class="dot">•</span><time datetime="${esc(it.pubDate)}">${ago(it.pubDate)||'Recently'}</time></div>
    <div class="art-hero">${heroImg}</div>
    ${body}
    <div class="srcbox"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div>${hasArticle?`This article was written by <strong>TownFeed</strong> using reporting from <a href="${esc(it.realLink||it.link)}" target="_blank" rel="noopener nofollow">${esc(it.sourceName||it.source)}</a>. Only facts from the original report are included.`:`Reported by <a href="${esc(it.realLink||it.link)}" target="_blank" rel="noopener nofollow">${esc(it.sourceName||it.source)}</a>.`}</div></div>
    <a class="read-orig" href="${esc(it.realLink||it.link)}" target="_blank" rel="noopener nofollow">Read the full story at ${esc(it.sourceName||it.source||'the source')} ↗</a>
    <div class="share-row"><a class="share-btn fb" href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}" target="_blank" rel="noopener"><svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>Share</a><button class="share-btn" id="copy-btn"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy link</button></div>
    <div class="ad"><div class="ad-eye">Reach all of ${esc(edName())}</div><div class="ad-hed">Advertise with TownFeed</div><div class="ad-sub">Connect with readers across the county. <a href="mailto:${CFG.AD}?subject=TownFeed%20Advertising">Get started ↗</a></div></div>
    ${related.length?`<div class="rel"><h3>More coverage of this story</h3>${related.map(r=>`<a class="rel-link" href="${esc(r.link)}" target="_blank" rel="noopener nofollow">${r.source?`<img src="https://www.google.com/s2/favicons?sz=24&domain=${encodeURIComponent(r.source)}" width="18" height="18" style="border-radius:5px" alt="" onerror="this.remove()">`:''}<span>${esc(r.sourceName||r.source||'Source')}</span><span class="ext">↗</span></a>`).join('')}</div>`:''}
  </div>`;
  $('#art-back')?.addEventListener('click',()=>{navTo('/');setTimeout(()=>window.scrollTo(0,S.scrollY||0),50);});
  $('#copy-btn')?.addEventListener('click',function(){navigator.clipboard?.writeText(`https://townfeed.app/article/${it.id}`);this.innerHTML='✓ Copied!';});
}
function renderFoot(){if(!S.data)return;const m=S.data.meta||{};$('#foot-meta').textContent=`Updated ${m.lastRun?ago(m.lastRun):'recently'}`;}
})();
</script>
</body>
</html>
