<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f8f4ec">
  <title>TownFeed — Kossuth County · Iowa</title>
  <meta name="description" content="All the news from Kossuth County, Iowa. Algona, Bancroft, Burt, Titonka, Swea City, Wesley, Whittemore, Lu Verne, Lakota, Lone Rock, Ledyard, Fenton — sports, obituaries, weather alerts and more, updated every 10 minutes.">
  <link rel="canonical" href="https://townfeed.app/">
  <meta property="og:title" content="TownFeed — Kossuth County News">
  <meta property="og:description" content="Every story from Kossuth County, Iowa — local news, sports, obituaries, weather alerts. Updated every 10 minutes.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&display=swap" rel="stylesheet">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsMediaOrganization",
    "name": "TownFeed",
    "alternateName": "TownFeed Kossuth County",
    "url": "https://townfeed.app/",
    "areaServed": { "@type": "AdministrativeArea", "name": "Kossuth County, Iowa" },
    "description": "Hyperlocal news aggregator for Kossuth County, Iowa.",
    "publishingPrinciples": "https://townfeed.app/"
  }
  </script>

  <style>
    :root {
      --bg: #f8f4ec;
      --bg-soft: #ece6d7;
      --card: #ffffff;
      --text: #0a0a0a;
      --text-soft: #4a4a4a;
      --line: #0a0a0a;
      --shadow: 6px 6px 0 #0a0a0a;
      --shadow-sm: 3px 3px 0 #0a0a0a;
      --shadow-press: 2px 2px 0 #0a0a0a;
      --accent: #ff3b30;
      --accent-soft: #ffe8e6;
      --good: #1aa84a;
      --warn: #ff8a00;
      --r: 18px;
      --r-sm: 12px;
      --r-pill: 999px;
      --border: 2.5px solid var(--line);
      --t-fast: 120ms cubic-bezier(.2,.7,.3,1);
    }
    [data-theme="dark"] {
      --bg: #0a0a0a;
      --bg-soft: #161616;
      --card: #1a1a1a;
      --text: #f8f4ec;
      --text-soft: #b8b3a6;
      --line: #f8f4ec;
      --shadow: 6px 6px 0 #f8f4ec;
      --shadow-sm: 3px 3px 0 #f8f4ec;
      --shadow-press: 2px 2px 0 #f8f4ec;
      --accent: #ff5b51;
      --accent-soft: #2a1614;
    }
    *,*::before,*::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Newsreader', Georgia, serif;
      font-size: 18px;
      line-height: 1.5;
      min-height: 100vh;
      transition: background var(--t-fast), color var(--t-fast);
    }
    a { color: inherit; }
    button { font: inherit; cursor: pointer; }
    img { display: block; max-width: 100%; }

    .container { max-width: 1180px; margin: 0 auto; padding: 0 22px; }

    /* ===== HEADER ===== */
    header.site {
      padding: 22px 0 14px;
      border-bottom: var(--border);
      background: var(--bg);
      position: sticky; top: 0; z-index: 30;
    }
    .hd-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .brand {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 5vw, 40px);
      letter-spacing: -0.03em;
      line-height: 1;
      text-decoration: none;
      color: var(--text);
      display: inline-flex; align-items: baseline; gap: 8px;
    }
    .brand .mark {
      display: inline-block;
      background: var(--text);
      color: var(--bg);
      padding: 4px 10px 6px;
      border-radius: var(--r-sm);
      font-size: 0.95em;
      transform: rotate(-2deg);
    }
    .tagline {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: var(--text-soft);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .hd-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .search {
      display: flex; align-items: center; gap: 8px;
      background: var(--card);
      border: var(--border);
      border-radius: var(--r-pill);
      padding: 6px 14px;
      box-shadow: var(--shadow-sm);
      transition: transform var(--t-fast), box-shadow var(--t-fast);
    }
    .search:focus-within { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--line); }
    .search input {
      border: 0; background: transparent; outline: none; color: var(--text);
      font-family: 'Bricolage Grotesque', sans-serif; font-weight: 500; font-size: 15px;
      width: 180px;
    }
    .search input::placeholder { color: var(--text-soft); }
    .icon-btn {
      width: 42px; height: 42px;
      border: var(--border); background: var(--card);
      border-radius: var(--r-pill);
      box-shadow: var(--shadow-sm);
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--text);
      transition: transform var(--t-fast), box-shadow var(--t-fast);
    }
    .icon-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--line); }
    .icon-btn:active { transform: translate(2px,2px); box-shadow: var(--shadow-press); }
    .icon-btn svg { width: 20px; height: 20px; }

    /* ===== WEATHER BANNER ===== */
    .weather-banner {
      margin: 18px 0 0;
      border: var(--border);
      border-radius: var(--r);
      background: var(--accent);
      color: #fff;
      box-shadow: var(--shadow);
      padding: 18px 22px;
      display: flex; gap: 16px; align-items: flex-start;
      font-family: 'Bricolage Grotesque', sans-serif;
      position: relative;
    }
    [data-theme="dark"] .weather-banner { color: #fff; }
    .weather-banner.minor { background: var(--warn); }
    .weather-banner .wb-icon {
      flex: 0 0 auto; width: 42px; height: 42px;
      background: #fff; color: var(--accent);
      border: 2.5px solid #0a0a0a;
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 22px;
    }
    .weather-banner h3 {
      margin: 0 0 4px; font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800; font-size: 20px; letter-spacing: -0.01em;
    }
    .weather-banner p { margin: 0; font-family: 'Newsreader', serif; font-size: 16px; line-height: 1.4; }
    .weather-banner .wb-expires {
      font-size: 13px; opacity: 0.9; font-weight: 600;
      margin-top: 6px; letter-spacing: 0.02em; text-transform: uppercase;
    }
    .weather-pager { display: flex; gap: 6px; margin-top: 10px; }
    .weather-pager button {
      background: #fff; color: var(--text); border: 2px solid #0a0a0a;
      border-radius: var(--r-pill); padding: 4px 12px; font-weight: 700; font-size: 13px;
    }
    .weather-pager button[disabled] { opacity: 0.4; cursor: default; }

    /* ===== TABS ===== */
    .tabs {
      display: flex; gap: 10px;
      margin: 22px 0 14px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 0 0 auto;
      background: var(--card);
      border: var(--border);
      border-radius: var(--r-pill);
      box-shadow: var(--shadow-sm);
      padding: 10px 20px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700; font-size: 15px;
      letter-spacing: -0.005em;
      color: var(--text);
      transition: transform var(--t-fast), box-shadow var(--t-fast);
      white-space: nowrap;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .tab .pill {
      background: var(--bg-soft); color: var(--text-soft);
      border-radius: var(--r-pill); padding: 2px 8px; font-size: 12px; font-weight: 700;
    }
    .tab:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--line); }
    .tab.active {
      background: var(--text); color: var(--bg);
      transform: translate(2px,2px); box-shadow: var(--shadow-press);
    }
    .tab.active .pill { background: var(--bg); color: var(--text); }

    /* ===== FILTER CHIPS ===== */
    .chip-row {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin: 0 0 18px;
    }
    .chip-label {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700; font-size: 11px; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-soft);
      align-self: center; margin-right: 4px;
    }
    .chip {
      background: var(--card); color: var(--text);
      border: 2px solid var(--line);
      border-radius: var(--r-pill);
      padding: 6px 14px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 600; font-size: 14px;
      transition: all var(--t-fast);
    }
    .chip:hover { background: var(--bg-soft); }
    .chip.active { background: var(--text); color: var(--bg); }

    /* ===== STATUS / EMPTY / LOADING ===== */
    .status {
      padding: 60px 22px; text-align: center;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: var(--text-soft); font-size: 15px;
    }
    .status .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid var(--line); border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== FEED GRID ===== */
    .feed {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 22px;
      margin-bottom: 30px;
    }
    .card {
      background: var(--card);
      border: var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: flex; flex-direction: column;
      transition: transform var(--t-fast), box-shadow var(--t-fast);
      will-change: transform;
    }
    .card:hover { transform: translate(-2px,-2px); box-shadow: 8px 8px 0 var(--line); }
    .card:active { transform: translate(2px,2px); box-shadow: var(--shadow-press); }
    .card .cover {
      position: relative; aspect-ratio: 16/9; overflow: hidden;
      border-bottom: var(--border);
      background: var(--bg-soft);
    }
    .card .cover img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0; transition: opacity 300ms ease;
    }
    .card .cover img.loaded { opacity: 1; }
    .card .cover .gradient {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800; font-size: 38px; color: rgba(255,255,255,0.95);
      letter-spacing: -0.02em;
      text-shadow: 0 2px 0 rgba(0,0,0,0.2);
      padding: 10px;
      text-align: center;
    }
    .card .cover .pub-name {
      position: absolute; bottom: 8px; left: 10px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700; font-size: 12px;
      color: rgba(255,255,255,0.95);
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      pointer-events: none;
    }
    .card .new-badge {
      position: absolute; top: 10px; left: 10px;
      background: var(--accent); color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800; font-size: 11px;
      padding: 4px 9px;
      border: 2px solid #0a0a0a; border-radius: var(--r-sm);
      letter-spacing: 0.08em;
      box-shadow: 2px 2px 0 #0a0a0a;
    }
    .card .topic-badge {
      position: absolute; top: 10px; right: 10px;
      background: var(--card); color: var(--text);
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700; font-size: 11px;
      padding: 4px 9px;
      border: 2px solid var(--line); border-radius: var(--r-sm);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .card .body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .card .source-row {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 13px; font-weight: 600;
      color: var(--text-soft);
    }
    .card .source-row .favicon {
      width: 16px; height: 16px; border-radius: 4px;
      background: var(--bg-soft);
    }
    .card .source-row .dot { opacity: 0.5; }
    .card h2 {
      margin: 0;
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 600;
      font-size: 19px; line-height: 1.25;
      letter-spacing: -0.005em;
      color: var(--text);
    }
    .card .desc {
      font-family: 'Newsreader', serif; font-size: 14.5px;
      color: var(--text-soft); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* OBIT CARD — different feel */
    .card.obit .cover { display: none; }
    .card.obit { background: var(--card); }
    .card.obit h2 { font-style: italic; font-weight: 500; }
    .card.obit .body::before {
      content: '✦';
      font-family: 'Newsreader', serif;
      font-size: 22px; color: var(--text-soft);
      align-self: flex-start; line-height: 1; margin-bottom: 4px;
    }

    /* ===== LOAD MORE ===== */
    .load-more {
      display: block; margin: 10px auto 40px;
      padding: 14px 28px;
      background: var(--card); color: var(--text);
      border: var(--border); border-radius: var(--r);
      box-shadow: var(--shadow);
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700; font-size: 16px;
      letter-spacing: -0.005em;
      transition: transform var(--t-fast), box-shadow var(--t-fast);
    }
    .load-more:hover { transform: translate(-2px,-2px); box-shadow: 8px 8px 0 var(--line); }
    .load-more:active { transform: translate(2px,2px); box-shadow: var(--shadow-press); }

    /* ===== ARTICLE PAGE ===== */
    .article { padding: 30px 0 60px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700;
      font-size: 14px; color: var(--text); text-decoration: none;
      padding: 8px 14px; border: 2px solid var(--line); border-radius: var(--r-pill);
      box-shadow: var(--shadow-sm);
      transition: transform var(--t-fast), box-shadow var(--t-fast);
      background: var(--card);
    }
    .back-link:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--line); }

    .article-cover {
      margin: 22px 0;
      border: var(--border); border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow: hidden; aspect-ratio: 16/9;
      position: relative; background: var(--bg-soft);
    }
    .article-cover img { width: 100%; height: 100%; object-fit: cover; }
    .article-cover .gradient {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800; font-size: 56px;
      color: rgba(255,255,255,0.95);
      letter-spacing: -0.02em;
      text-shadow: 0 3px 0 rgba(0,0,0,0.2);
    }
    .article-meta {
      display: flex; gap: 14px; align-items: center;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 600; font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .article-meta .favicon { width: 20px; height: 20px; border-radius: 5px; background: var(--bg-soft); }
    .article-meta .dot { opacity: 0.5; }
    .article-meta .topic-tag {
      background: var(--text); color: var(--bg);
      padding: 3px 10px; border-radius: var(--r-pill);
      font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 800;
    }
    .article h1 {
      font-family: 'Newsreader', serif;
      font-weight: 700; font-size: clamp(28px, 5vw, 44px);
      line-height: 1.1; letter-spacing: -0.015em;
      margin: 0 0 16px;
    }
    .article-desc {
      font-family: 'Newsreader', serif;
      font-size: 19px; line-height: 1.5;
      color: var(--text-soft);
      margin-bottom: 26px;
      max-width: 720px;
    }

    .ad-slot {
      margin: 30px 0;
      padding: 26px;
      background: var(--card);
      border: 2.5px dashed var(--line);
      border-radius: var(--r);
      text-align: center;
      font-family: 'Bricolage Grotesque', sans-serif;
    }
    .ad-slot .label {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      font-weight: 700; color: var(--text-soft); margin-bottom: 6px;
    }
    .ad-slot .pitch { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .ad-slot .cta {
      font-family: 'Newsreader', serif; font-size: 15px;
      color: var(--text-soft);
    }
    .ad-slot a { color: var(--accent); text-decoration: underline; font-weight: 700; }

    .related h3 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800; font-size: 18px; letter-spacing: -0.01em;
      margin: 30px 0 14px;
    }
    .related-list { display: flex; flex-direction: column; gap: 10px; }
    .related-list a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: var(--card); border: 2px solid var(--line);
      border-radius: var(--r-sm); box-shadow: var(--shadow-sm);
      text-decoration: none; color: var(--text);
      font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; font-size: 14px;
      transition: transform var(--t-fast), box-shadow var(--t-fast);
    }
    .related-list a:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--line); }
    .related-list .favicon { width: 16px; height: 16px; border-radius: 4px; }

    .source-fine {
      margin-top: 36px; padding-top: 18px;
      border-top: 1.5px solid var(--bg-soft);
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 11px; color: var(--text-soft);
      letter-spacing: 0.04em; text-align: center;
    }
    .source-fine a { color: var(--text-soft); text-decoration: underline; }
    .source-fine a:hover { color: var(--text); }

    /* ===== FOOTER ===== */
    footer.site {
      border-top: var(--border);
      margin-top: 50px; padding: 24px 0 40px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 13px; color: var(--text-soft);
      display: flex; gap: 12px; justify-content: space-between; flex-wrap: wrap;
    }
    footer.site .meta { font-variant-numeric: tabular-nums; }
    footer.site a { color: var(--text-soft); text-decoration: underline; }
    footer.site a:hover { color: var(--text); }

    @media (max-width: 640px) {
      .container { padding: 0 14px; }
      .feed { grid-template-columns: 1fr; gap: 16px; }
      .search input { width: 130px; }
      .brand { font-size: 30px; }
      header.site { padding: 14px 0 12px; }
    }
  </style>
</head>

  <header class="site">
    <div class="container hd-row">
      <a href="#/" class="brand" aria-label="TownFeed home">
        <span>Town</span><span class="mark">Feed</span>
      </a>
      <div class="tagline" id="tagline">Kossuth County · Iowa</div>
      <div class="hd-actions">
        <label class="search" aria-label="Search stories">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
          <input id="search" placeholder="Search…" autocomplete="off">
        </label>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle dark mode">
          <svg id="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg id="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container" id="app">
    <!-- views injected here -->
  </main>

  <footer class="site container">
    <div class="meta" id="footer-meta">Updated never · 0 stories</div>
    <div>
      Independent · Built for the county · <a href="mailto:ads@townfeed.app">Advertise</a>
    </div>
  </footer>

  <script>
  // ============================================================
  // TownFeed frontend
  // ============================================================
  const CFG = window.TF_CONFIG;
  const $ = (s, r = document) => r.querySelector(s);
  const $$ = (s, r = document) => [...r.querySelectorAll(s)];

  const state = {
    data: null,           // { news, sports, obits, weather, meta }
    etag: null,
    activeTab: 'news',    // 'news' | 'sports' | 'obits'
    activeTowns: new Set(),
    activeTopics: new Set(),
    search: '',
    pageSize: CFG.PAGE_SIZE,
    visible: CFG.PAGE_SIZE,
    weatherIdx: 0,
    loading: false,
  };

  // ===== THEME =====
  const themeBtn = $('#theme-toggle');
  const sunIco = $('#ico-sun'), moonIco = $('#ico-moon');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.querySelector('meta[name="theme-color"]').setAttribute('content', t === 'dark' ? '#0a0a0a' : '#f8f4ec');
    sunIco.style.display = t === 'dark' ? 'block' : 'none';
    moonIco.style.display = t === 'dark' ? 'none' : 'block';
  }
  applyTheme(localStorage.getItem('tf-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
  themeBtn.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('tf-theme', next);
    applyTheme(next);
  });

  // ===== SEARCH =====
  let searchTimer;
  $('#search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.search = e.target.value.toLowerCase().trim();
      state.visible = state.pageSize;
      render();
    }, 150);
  });

  // ===== DATA FETCH =====
  async function loadFromCache() {
    try {
      const raw = localStorage.getItem(CFG.CACHE_KEY);
      if (!raw) return null;
      const { data, etag, ts } = JSON.parse(raw);
      if (data && data.news) {
        state.data = data;
        state.etag = etag;
        return data;
      }
    } catch {}
    return null;
  }
  function saveToCache() {
    try {
      localStorage.setItem(CFG.CACHE_KEY, JSON.stringify({
        data: state.data, etag: state.etag, ts: Date.now(),
      }));
    } catch {}
  }
  async function fetchFeed(opts = {}) {
    if (state.loading) return;
    state.loading = true;
    try {
      const headers = {};
      if (state.etag && !opts.force) headers['If-None-Match'] = state.etag;
      const resp = await fetch(CFG.WORKER_URL + '/feed', { headers });
      if (resp.status === 304) { return; }
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const etag = resp.headers.get('ETag');
      const data = await resp.json();
      state.data = data;
      state.etag = etag;
      saveToCache();
      render();
    } catch (e) {
      if (!state.data) {
        $('#app').innerHTML = `
          <div class="status">
            Couldn't reach the feed. <br>
            <span style="font-size:13px;opacity:0.7">${escapeHtml(e.message)}</span>
          </div>`;
      }
    } finally {
      state.loading = false;
    }
  }

  // Cache-first, then refresh from network
  (async () => {
    const cached = await loadFromCache();
    if (cached) render();
    await fetchFeed();
    // Auto-refresh every N ms when visible
    setInterval(() => { if (!document.hidden) fetchFeed(); }, CFG.REFRESH_MS);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) fetchFeed(); });
  })();

  // ===== ROUTER =====
  function parseRoute() {
    const h = location.hash.replace(/^#/, '') || '/';
    if (h.startsWith('/a/')) return { view: 'article', id: h.slice(3) };
    if (h.startsWith('/t/')) return { view: 'home', town: h.slice(3) };
    return { view: 'home' };
  }
  window.addEventListener('hashchange', render);

  // ===== RENDER =====
  function render() {
    if (!state.data) {
      $('#app').innerHTML = `
        <div class="status"><span class="spinner"></span> Loading the latest from the county…</div>`;
      return;
    }
    const route = parseRoute();
    if (route.view === 'article') renderArticle(route.id);
    else renderHome(route);
    updateFooter();
  }

  // ----- HOME VIEW -----
  function renderHome(route) {
    const app = $('#app');
    if (route.town) state.activeTowns = new Set([route.town]);

    const tabs = [
      { key: 'news',   label: 'News',         items: state.data.news },
      { key: 'sports', label: 'Sports',       items: state.data.sports },
      { key: 'obits',  label: 'Obituaries',   items: state.data.obits },
    ];

    const html = [];

    // Weather banner
    const wx = state.data.weather || [];
    if (wx.length) {
      html.push(renderWeather(wx));
    }

    // Tabs
    html.push(`<div class="tabs" role="tablist">${tabs.map(t => `
      <button class="tab ${state.activeTab === t.key ? 'active' : ''}" data-tab="${t.key}" role="tab">
        ${t.label} <span class="pill">${t.items.length}</span>
      </button>`).join('')}</div>`);

    // Filter chips (only on News tab)
    if (state.activeTab === 'news') {
      html.push(`<div class="chip-row" id="topic-chips">
        <span class="chip-label">Topics</span>
        ${CFG.TOPICS.map(([s,n]) => `<button class="chip ${state.activeTopics.has(s)?'active':''}" data-topic="${s}">${n}</button>`).join('')}
      </div>`);
      html.push(`<div class="chip-row" id="town-chips">
        <span class="chip-label">Towns</span>
        ${CFG.TOWNS.map(([s,n]) => `<button class="chip ${state.activeTowns.has(s)?'active':''}" data-town="${s}">${n}</button>`).join('')}
      </div>`);
    }

    // Feed
    const items = filterItems(tabs.find(t => t.key === state.activeTab).items);
    const visible = items.slice(0, state.visible);

    if (!visible.length) {
      html.push(`<div class="status">No stories match. Try clearing filters or search.</div>`);
    } else {
      html.push(`<div class="feed">${visible.map(it => renderCard(it, state.activeTab)).join('')}</div>`);
      if (items.length > state.visible) {
        html.push(`<button class="load-more" id="load-more">Load more (${items.length - state.visible} left)</button>`);
      }
    }

    app.innerHTML = html.join('');
    wireHome();
  }

  function filterItems(items) {
    const s = state.search;
    return items.filter(it => {
      if (state.activeTab === 'news') {
        if (state.activeTopics.size && !state.activeTopics.has(it.topic)) return false;
        if (state.activeTowns.size && !state.activeTowns.has(it.town)) return false;
      }
      if (s) {
        const blob = ((it.title || '') + ' ' + (it.description || '') + ' ' + (it.sourceName || '')).toLowerCase();
        if (!blob.includes(s)) return false;
      }
      return true;
    });
  }

  function wireHome() {
    $$('.tab').forEach(b => b.addEventListener('click', () => {
      state.activeTab = b.dataset.tab;
      state.visible = state.pageSize;
      render();
    }));
    $$('#topic-chips .chip').forEach(b => b.addEventListener('click', () => {
      const t = b.dataset.topic;
      if (state.activeTopics.has(t)) state.activeTopics.delete(t); else state.activeTopics.add(t);
      state.visible = state.pageSize;
      render();
    }));
    $$('#town-chips .chip').forEach(b => b.addEventListener('click', () => {
      const t = b.dataset.town;
      if (state.activeTowns.has(t)) state.activeTowns.delete(t); else state.activeTowns.add(t);
      state.visible = state.pageSize;
      render();
    }));
    const lm = $('#load-more');
    if (lm) lm.addEventListener('click', () => {
      state.visible += state.pageSize;
      render();
    });
    // Weather pager
    $$('.weather-pager button').forEach(b => b.addEventListener('click', () => {
      const dir = b.dataset.dir === 'next' ? 1 : -1;
      const total = state.data.weather.length;
      state.weatherIdx = Math.max(0, Math.min(total - 1, state.weatherIdx + dir));
      render();
    }));
  }

  // ----- WEATHER -----
  function renderWeather(wx) {
    const idx = Math.min(state.weatherIdx, wx.length - 1);
    const a = wx[idx];
    const severeEvents = ['Tornado Warning','Severe Thunderstorm Warning','Flash Flood Warning','Blizzard Warning'];
    const isSevere = severeEvents.some(e => (a.event || '').toLowerCase().includes(e.toLowerCase()));
    const cls = isSevere ? '' : 'minor';
    const expiresStr = a.expires ? 'Expires ' + fmtRelative(a.expires) : '';
    const pager = wx.length > 1 ? `
      <div class="weather-pager">
        <button data-dir="prev" ${idx === 0 ? 'disabled' : ''}>← Prev</button>
        <button data-dir="next" ${idx === wx.length-1 ? 'disabled' : ''}>Next →</button>
        <span style="margin-left:auto;font-size:12px;font-weight:600;opacity:0.9;align-self:center">
          ${idx+1} of ${wx.length}
        </span>
      </div>` : '';
    return `
      <div class="weather-banner ${cls}">
        <div class="wb-icon">!</div>
        <div style="flex:1;min-width:0">
          <h3>${escapeHtml(a.event)}</h3>
          <p>${escapeHtml(truncate(a.headline || a.description, 240))}</p>
          ${expiresStr ? `<div class="wb-expires">${expiresStr}</div>` : ''}
          ${pager}
        </div>
      </div>`;
  }

  // ----- CARD -----
  function renderCard(it, tab) {
    const isObit = tab === 'obits';
    const ageMs = Date.now() - (Date.parse(it.pubDate) || Date.now());
    const isNew = ageMs < CFG.NEW_THRESHOLD_HOURS * 3600 * 1000;
    const seedHue = strHash(it.sourceName || it.source || 'x') % 360;
    const grad = `linear-gradient(135deg, hsl(${seedHue}, 70%, 45%), hsl(${(seedHue+40)%360}, 70%, 35%))`;
    const initial = (it.sourceName || it.source || '?').trim().charAt(0).toUpperCase();
    const favicon = it.source
      ? `https://www.google.com/s2/favicons?sz=32&domain=${encodeURIComponent(it.source)}`
      : '';
    const topicLbl = (it.topic || '').toUpperCase();
    const showTopic = !isObit && tab === 'news' && it.topic && it.topic !== 'community';

    return `
      <a class="card ${isObit ? 'obit' : ''}" href="#/a/${encodeURIComponent(it.id)}">
        ${!isObit ? `
        <div class="cover" style="background: ${grad}">
          <div class="gradient">${escapeHtml(initial)}</div>
          ${it.image ? `<img loading="lazy" referrerpolicy="no-referrer" src="${escapeAttr(it.image)}" alt="" onload="this.classList.add('loaded')" onerror="this.remove()">` : ''}
          ${isNew ? `<span class="new-badge">NEW</span>` : ''}
          ${showTopic ? `<span class="topic-badge">${escapeHtml(topicLbl)}</span>` : ''}
          <span class="pub-name">${escapeHtml(it.sourceName || it.source || '')}</span>
        </div>` : ''}
        <div class="body">
          ${isObit ? '' : `<div class="source-row">
            ${favicon ? `<img class="favicon" src="${escapeAttr(favicon)}" alt="" onerror="this.remove()">` : ''}
            <span>${escapeHtml(it.sourceName || '')}</span>
            <span class="dot">·</span>
            <span>${fmtRelative(it.pubDate)}</span>
          </div>`}
          <h2>${escapeHtml(it.title)}</h2>
          ${it.description ? `<div class="desc">${escapeHtml(it.description)}</div>` : ''}
          ${isObit ? `<div class="source-row" style="margin-top:auto">
            <span>${escapeHtml(it.sourceName || '')}</span>
            <span class="dot">·</span>
            <span>${fmtRelative(it.pubDate)}</span>
          </div>` : ''}
        </div>
      </a>`;
  }

  // ----- ARTICLE VIEW -----
  function renderArticle(id) {
    const all = [
      ...(state.data.news || []),
      ...(state.data.sports || []),
      ...(state.data.obits || []),
    ];
    const it = all.find(x => x.id === id);
    if (!it) {
      $('#app').innerHTML = `
        <div class="status">
          Story not found.<br>
          <a href="#/" style="color:var(--accent);font-weight:700">← Back to feed</a>
        </div>`;
      return;
    }
    // Push history so back arrow works
    document.title = `${it.title} — TownFeed`;

    const seedHue = strHash(it.sourceName || it.source || 'x') % 360;
    const grad = `linear-gradient(135deg, hsl(${seedHue}, 70%, 45%), hsl(${(seedHue+40)%360}, 70%, 35%))`;
    const initial = (it.sourceName || it.source || '?').trim().charAt(0).toUpperCase();
    const favicon = it.source
      ? `https://www.google.com/s2/favicons?sz=64&domain=${encodeURIComponent(it.source)}`
      : '';
    const related = (it.related || []).filter(r => r.link);

    $('#app').innerHTML = `
      <article class="article">
        <a href="#/" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          Back
        </a>

        <div class="article-cover" style="background:${grad}">
          ${it.image ? `<img referrerpolicy="no-referrer" src="${escapeAttr(it.image)}" alt="" onerror="this.remove()">`
                     : `<div class="gradient">${escapeHtml(initial)}</div>`}
        </div>

        <div class="article-meta">
          ${favicon ? `<img class="favicon" src="${escapeAttr(favicon)}" alt="" onerror="this.remove()">` : ''}
          <span>${escapeHtml(it.sourceName || '')}</span>
          <span class="dot">·</span>
          <span>${fmtRelative(it.pubDate)}</span>
          ${it.topic && it.topic !== 'community' ? `<span class="topic-tag">${escapeHtml(it.topic.toUpperCase())}</span>` : ''}
        </div>

        <h1>${escapeHtml(it.title)}</h1>
        ${it.description ? `<div class="article-desc">${escapeHtml(it.description)}</div>` : ''}

        <div class="ad-slot">
          <div class="label">Sponsored slot</div>
          <div class="pitch">Your business here.</div>
          <div class="cta">Reach every Kossuth County reader. <a href="mailto:${CFG.ADVERTISE_EMAIL}?subject=TownFeed%20advertising">Email to advertise</a>.</div>
        </div>

        ${related.length ? `
          <div class="related">
            <h3>More coverage</h3>
            <div class="related-list">
              ${related.map(r => `
                <a href="${escapeAttr(r.link)}" target="_blank" rel="noopener nofollow">
                  ${r.source ? `<img class="favicon" src="https://www.google.com/s2/favicons?sz=32&domain=${encodeURIComponent(r.source)}" alt="" onerror="this.remove()">` : ''}
                  <span>${escapeHtml(r.sourceName || r.source || 'Source')}</span>
                </a>`).join('')}
            </div>
          </div>` : ''}

        <div class="source-fine">
          Originally reported by <a href="${escapeAttr(it.realLink || it.link)}" target="_blank" rel="noopener nofollow">${escapeHtml(it.sourceName || it.source || 'source')} ↗</a>
        </div>
      </article>`;
  }

  // ----- FOOTER META -----
  function updateFooter() {
    if (!state.data) return;
    const m = state.data.meta || {};
    const total = (state.data.news?.length || 0) + (state.data.sports?.length || 0) + (state.data.obits?.length || 0);
    const updated = m.lastRun ? fmtRelative(m.lastRun) : 'never';
    $('#footer-meta').textContent = `Updated ${updated} · ${total} stories tracked`;
  }

  // ===== UTILITIES =====
  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }
  function strHash(s) {
    let h = 0; for (let i = 0; i < s.length; i++) h = ((h<<5)-h+s.charCodeAt(i)) | 0;
    return Math.abs(h);
  }
  function truncate(s, n) {
    s = String(s || '');
    return s.length > n ? s.slice(0, n).trim() + '…' : s;
  }
  function fmtRelative(when) {
    if (!when) return '—';
    const ts = typeof when === 'string' ? Date.parse(when) : when;
    if (!ts) return '—';
    const diff = (Date.now() - ts) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
    if (diff < 2592000) return Math.floor(diff/604800) + 'w ago';
    return new Date(ts).toLocaleDateString();
  }
  </script>
</body>
</html>
