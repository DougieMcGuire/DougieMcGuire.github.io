<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web-Haptics Static Demo</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align:center; margin-top:50px; }
  button { font-size:18px; margin:12px; padding:12px 24px; border-radius:8px; border:none; background:#0078ff; color:white; cursor:pointer; }
</style>
</head>
<body>

<h1>Web-Haptics Static Demo</h1>
<button id="successBtn">Success</button>
<button id="errorBtn">Error</button>
<button id="buzzBtn">Buzz</button>
<button id="customBtn">Custom</button>

<script type="module">
import { WebHaptics } from "https://esm.sh/web-haptics";

// ✅ Create a single global instance
const haptics = new WebHaptics({ debug:true });

// Bind buttons to patterns
document.getElementById("successBtn").addEventListener("pointerdown", () => {
    haptics.trigger("success");
});
document.getElementById("errorBtn").addEventListener("pointerdown", () => {
    haptics.trigger("error");
});
document.getElementById("buzzBtn").addEventListener("pointerdown", () => {
    haptics.trigger("buzz");
});
document.getElementById("customBtn").addEventListener("pointerdown", () => {
    // Custom pattern: [vibrate 80ms, pause 50ms, vibrate 80ms]
    haptics.trigger([80, 50, 80]);
});
</script>

</body>
</html>
