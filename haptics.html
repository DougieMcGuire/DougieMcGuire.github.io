<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web-Haptics CDN Test</title>
<style>
  button { margin:12px; padding:14px 22px; font-size:18px; border-radius:8px; background:#0078ff; color:white; border:none; cursor:pointer; }
</style>
</head>
<body>

<h1>Web-Haptics CDN Demo</h1>
<button id="successBtn">Success</button>
<button id="errorBtn">Error</button>

<script type="module">
  import { WebHaptics } from "https://esm.sh/web-haptics";

  const haptics = new WebHaptics({ debug:true });

  document.getElementById("successBtn").addEventListener("pointerdown", () => {
    haptics.trigger("success");
  });

  document.getElementById("errorBtn").addEventListener("pointerdown", () => {
    haptics.trigger("error");
  });
</script>

</body>
</html>
