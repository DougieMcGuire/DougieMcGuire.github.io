<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebHaptics Vanilla Demo</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align:center; padding:50px; }
    button { font-size:18px; margin:10px; padding:12px 20px; }
  </style>
</head>
<body>

  <h1>Web Haptics Demo</h1>
  <button id="success">Success</button>
  <button id="error">Error</button>
  <button id="buzz">Buzz</button>
  <button id="custom">Custom</button>

  <script type="module">
    // import the library from a CDN
    import { WebHaptics } from "https://esm.sh/web-haptics";

    const haptics = new WebHaptics();

    document.getElementById("success").addEventListener("pointerdown", () => {
      haptics.trigger("success");
    });

    document.getElementById("error").addEventListener("pointerdown", () => {
      haptics.trigger("error");
    });

    document.getElementById("buzz").addEventListener("pointerdown", () => {
      haptics.trigger("buzz");
    });

    document.getElementById("custom").addEventListener("pointerdown", () => {
      // alternate on/off 80ms vibrate, 40ms pause
      haptics.trigger([80, 40, 80]);
    });

  </script>

</body>
</html>
