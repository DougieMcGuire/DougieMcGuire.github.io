<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Haptics Test</title>
</head>
<body>
  <button id="light">Light Impact</button>

  <script type="module">
    import Haptics from "https://esm.sh/web-haptics";

    const haptics = new Haptics();

    document.getElementById("light").addEventListener("pointerdown", () => {
      haptics.impactLight();
    });
  </script>
</body>
</html>
